# Uruchamiane na zmienionych plikach. Instalacja: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=2048]
        # Wyłączamy INTENCJONALNE duże artefakty: zbudowane indeksy .marisa
        # (dane pakietowe, ~24 MB) i vendorowany SGJP .tab.gz (git-lfs).
        exclude: '^(src/polish_inflection/data/.*\.marisa|data/sgjp/.*\.tab\.gz)$'
