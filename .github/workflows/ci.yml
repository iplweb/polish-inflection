name: CI

on:
  push:
  pull_request:

# Minimalne uprawnienia domyślnego GITHUB_TOKEN (tylko odczyt repo).
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Lint never touches the vendored ~42 MB SGJP .tab.gz; skip Git LFS
          # so we don't waste time/bandwidth pulling it.
          lfs: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev tooling
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format (check only)
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The unit tests build small fixture indices with marisa-trie and never
          # read the real ~42 MB SGJP corpus vendored via Git LFS — skip LFS.
          lfs: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # marisa-trie (runtime dep) both builds and reads the indices, so the dev
      # group alone is enough to build fixture indices and run the suite.
      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

